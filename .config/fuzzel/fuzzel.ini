[main]
font=JetBrainsMono Nerd Font:size=13
icons-enable = yes
icon-theme = Papirus-Dark
fields = name, generic, comment, categories, filename, keywords
show-actions = yes
terminal=foot

prompt=> 

width=50
lines=10
horizontal-pad=28
vertical-pad=20
inner-pad=14
line-height=26

[colors]
background=111111ee
text=e0e0e0ff
match=ffffffaa
selection=2a2a2aff
selection-text=ffffffff
border=aaaaaaff

[border]
width=2
radius=0
