################
### SOURCING ###
################
source = ~/.config/hypr/modules/monitors.conf     # MONITORS
source = ~/.config/hypr/modules/programs.conf     # PROGRAMS
source = ~/.config/hypr/modules/autostart.conf    # AUTOSTART
source = ~/.config/hypr/modules/env.conf          # ENVIRONMENT VARIABLES
source = ~/.config/hypr/modules/permissions.conf  # PERMISSIONS
source = ~/.config/hypr/modules/looks.conf        # LOOKS
source = ~/.config/hypr/modules/decoration.conf   # DECORATION
source = ~/.config/hypr/modules/animation.conf    # ANIMATION
source = ~/.config/hypr/modules/input.conf        # INPUT
source = ~/.config/hypr/modules/binds.conf        # KEYBINDS
source = ~/.config/hypr/modules/windowrule.conf   # WINDOWRULE








# >>> HYPRLAND VISUAL EDITOR START <<<
# 1. Active Uninstall Watchdog
exec-once = /home/joestar/.cache/noctalia/HVE/hve_watchdog.sh
# 2. Variable Definition (Color Palette)
source = /home/joestar/.config/hypr/noctalia/noctalia-colors.conf
# 3. Effects Application (Visual Editor)
source = /home/joestar/.cache/noctalia/HVE/overlay.conf
# >>> HYPRLAND VISUAL EDITOR END <<<
env = GTK_ICON_THEME,Yaru-red
env = XDG_CURRENT_DESKTOP,Hyprland
