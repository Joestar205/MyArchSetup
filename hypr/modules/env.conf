#############################
### ENVIRONMENT VARIABLES ###
#############################
# See https://wiki.hypr.land/Configuring/Environment-variables/

# Cursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Nvidia DRM & Wayland
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __NV_PRIME_RENDER_OFFLOAD,1
env = __VK_LAYER_NV_optimus,NVIDIA_only

# Wayland preference for apps
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# Qt Wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_SCALE_FACTOR,1

# GTK Wayland
env = GDK_BACKEND,wayland,x11
env = GDK_SCALE,1
env = GTK_ICON_THEME,Yaru-red
env = XDG_DATA_DIRS,/usr/share:/usr/local/share
# Electron/Chromium Wayland (for Spotify, VSCode, etc.)
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Firefox Wayland
env = MOZ_ENABLE_WAYLAND,1

# Scaling (for your 1.6 scale / HiDPI)
env = GDK_DPI_SCALE,1

# XWayland scaling (for apps like Spotify that fall back to XWayland)
env = XWAYLAND_NO_GLAMOR,0
xwayland {
  force_zero_scaling = true
}
